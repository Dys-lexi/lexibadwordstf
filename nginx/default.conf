map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_real_ip $real_ip_to_forward {
    ''      $remote_addr;
    default $http_x_real_ip;
}

server {
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/socket.io/ {
        set $search_backend search:3440;
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://$search_backend$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip_to_forward;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_redirect off;
        proxy_read_timeout 86400;
    }

    location / {
        set $frontend_backend lexifront:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip_to_forward;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$frontend_backend$request_uri;
    }


}
