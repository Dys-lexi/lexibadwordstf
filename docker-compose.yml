services:
  postgres:
    image: postgres:17
    container_name: teamfort2db
    shm_size: '4gb'
    command:
      - "postgres"
      - "-c"
      - "max_connections=2000"
      - "-c"
      - "max_parallel_workers_per_gather=3"
      - "-c"
      - "max_parallel_workers=6"
      - "-c"
      - "max_worker_processes=16"
      - "-c"
      - "parallel_setup_cost=100"
      - "-c"
      - "parallel_tuple_cost=0.01"
      - "-c"
      - "min_parallel_table_scan_size=8MB"
      - "-c"
      - "shared_buffers=2GB"  # Adjust based on available RAM
      - "-c"
      - "work_mem=256MB"      # Helps with large sorts/regex
      - "-c"
      - "maintenance_work_mem=1GB"  # Helps with index creation
    environment:
      POSTGRES_USER: pguserm
      POSTGRES_PASSWORD: hiddenpassword
      POSTGRES_DB: realdb
      PGPORT: 3452
    ports:
      - "3449:3452"
    volumes:
      # - /mnt/bigdrives/tflogs/db:/var/lib/postgresql/data
      - ./db:/var/lib/postgresql/data
      - /mnt/bigdrives/tflogs/logs.sql:/var/logs.sql
      - ./dump:/var/bvmountIonlyhavelike7terrabytesofstoragepleasebekindtomethankyouloveyou
    restart: unless-stopped
  search:
    build:
      context: ./
      dockerfile: ./dockerfile
    depends_on:
        postgres:
          condition: service_started
    volumes:
      - ./search.py:/app/search.py:ro
      - ./tempurature.py:/app/tempurature.py:ro
      - ./initsql.py:/app/initsql.py:ro
      - ./statscache.json:/app/statscache.json:rw
      - ./slurcloud.py:/app/slurcloud.py:ro
      - ./chatfilters:/app/chatfilters:ro
      - ./wordcloud:/app/wordcloud:ro
    env_file:
      - ./.env
    restart: unless-stopped


  update:
    build:
      context: ./
      dockerfile: ./dockerfileforupdates
    depends_on:
        postgres:
          condition: service_started
    volumes:
      - ./update.py:/app/update.py:ro
      - ./initsql.py:/app/initsql.py:ro
      - ./chatfilters:/app/chatfilters:ro
    restart: unless-stopped
  lexifront:
    build:
      context: ./sveltelexi
      dockerfile: ./dockerfile
      args:
        VITE_API_URL: http://search:3440                                                                                                                                                                                                                    
    # depends_on:                                                                                                                                                                                                                                   
    #   - search                                                                                                                                                                                                                                                                                                                                                                                                                                                                
    restart: unless-stopped

    
  nginx:
    restart: always
    image: nginx:1-alpine
    depends_on:
      - lexifront
      - search
    ports:
      - 3000:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
